version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: plotiq_postgres
    environment:
      POSTGRES_USER: plotiq
      POSTGRES_PASSWORD: plotiq_dev_password
      POSTGRES_DB: plotiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plotiq -d plotiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: plotiq_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
